# Inserts a blank line between shell prompts
add_newline = false

# Replace the "ÔŁ»" symbol in the prompt with "Ô×ť"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[ÔŁ»](bold green)"     # The "success_symbol" segment is being set to "Ô×ť" with the color "bold green"
error_symbol = "[ÔŁ»](bold red)"
vimcmd_symbol =	"[ţśź](bold green)" 	# The format string used before the text input if the shell is in vim normal mode.
vimcmd_replace_one_symbol = "[ţśź](bold purple)" 	# The format string used before the text input if the shell is in vim replace_one mode.
vimcmd_replace_symbol = "[ţśź](bold purple)" 	# The format string used before the text input if the shell is in vim replace mode.
vimcmd_visual_symbol = "[ţśź](bold yellow)" 	# The format string used before the text input if the shell is in vim visual mode.

[username]
style_user = "red"
style_root = "blue"
format = "[$user]($style)"
