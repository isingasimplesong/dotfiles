# Inserts a blank line between shell prompts
add_newline = false

# Replace the "РЮ»" symbol in the prompt with "Ръю"
#[character]                            # The name of the module we are configuring is "character"
#success_symbol = "[Ръю](bold green)"     # The "success_symbol" segment is being set to "Ръю" with the color "bold green"

[username]
style_user = "bold red"
style_root = "bold blue"
format = "[$user]($style)"
