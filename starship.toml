# Inserts a blank line between shell prompts
add_newline = false

# Replace the "тЭп" symbol in the prompt with "тЮЬ"
[character]                            # The name of the module we are configuring is "character"
success_symbol = "[*](bold green)"     # The "success_symbol" segment is being set to "тЮЬ" with the color "bold green"
error_symbol = "[*](bold red)"
vimcmd_symbol =	"[v](bold green)" 	# The format string used before the text input if the shell is in vim normal mode.
vimcmd_replace_one_symbol = "[v](bold purple)" 	# The format string used before the text input if the shell is in vim replace_one mode.
vimcmd_replace_symbol = "[v](bold purple)" 	# The format string used before the text input if the shell is in vim replace mode.
vimcmd_visual_symbol = "[v](bold yellow)" 	# The format string used before the text input if the shell is in vim visual mode.

[username]
style_user = "red"
style_root = "blue"
format = "[$user]($style)"
disabled = false
show_always = true

[hostname]
ssh_only = false
format =  "@[$hostname](white) "
disabled = false

[sudo]
disabled = true

